name: Deploy a GitHub Pages

on:
  push:
    branches: [main]

# Permisos necesarios para Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evitar deploys simultáneos
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ⚙️ Configurar Pages
        uses: actions/configure-pages@v4

      - name: 📦 Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/   # Carpeta con tu sitio web

  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🌐 Desplegar a Pages
        id: deployment
        uses: actions/deploy-pages@v4