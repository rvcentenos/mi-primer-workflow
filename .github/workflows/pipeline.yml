name: Pipeline Completo

on:
  push:
    branches: [main]

jobs:

  # ── 1er job: revisar formato del código ──────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verificar formato
        run: |
          echo "✅ Revisando formato del código..."
          echo "Sin errores de lint"

  # ── 2do job: pruebas (espera a que lint pase) ────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: lint          # ← Se ejecuta SOLO si lint pasó
    steps:
      - uses: actions/checkout@v4
      - name: Ejecutar tests
        run: |
          echo "🧪 Corriendo suite de pruebas..."
          echo "✅ Todos los tests pasaron"

  # ── 3er job: deploy (espera a lint Y test) ───────────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [lint, test]   # ← Espera a AMBOS
    steps:
      - uses: actions/checkout@v4
      - name: Desplegar aplicación
        run: |
          echo "🚀 Desplegando en producción..."
          echo "✅ Deploy exitoso - Versión: ${{ github.sha }}"