name: CI con Caché (Node.js)

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'      # ← setup-node tiene caché integrado 🎉

      - name: 📦 Instalar dependencias
        run: npm ci         # ci es más rápido que install en CI

      - name: 🧪 Tests
        run: npm test
        
      - name: 📦 Caché node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: ⬇️ Instalar solo si no hay caché
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci