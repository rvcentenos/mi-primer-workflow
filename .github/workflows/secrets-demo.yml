name: Demo Secrets

on:
  push:
    branches: [main]

jobs:
  demo:
    runs-on: ubuntu-latest

    # Variables de entorno disponibles para TODOS los steps
    env:
      ENVIRONMENT: ${{ vars.APP_ENV }}         # Variable pública
      TOKEN:       ${{ secrets.MI_TOKEN_SECRETO }} # Secret cifrado

    steps:
      - uses: actions/checkout@v4

      - name: 📋 Mostrar variables de entorno
        run: |
          echo "Ambiente: $ENVIRONMENT"       # Muestra 'production'
          echo "Token: $TOKEN"                # Muestra '***' (oculto)
          echo "Repo: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "SHA: ${{ github.sha }}"

      - name: 🔑 Usar secret en un comando
        run: |
          # Así usarías un token para autenticarte en una API
          echo "Llamando API con token..."
          curl -s -o /dev/null -w "HTTP %{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            https://httpbin.org/bearer || true

  deploy-staging:
    runs-on: ubuntu-latest

    # Variables de entorno disponibles para TODOS los steps
    env:
      ENVIRONMENT: ${{ vars.APP_ENV }}  

    environment: staging   # ← Usa los secrets de este entorno

    steps:
      - name: 📋 Mostrar variables de entorno
        run: |
          echo "Desplegando en staging..."
          echo "Ambiente: $ENVIRONMENT"